<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link rel="stylesheet" href="../css/styleadmin.css">
    <script src="js/main.js"></script>
</head>
<body>

<div id="sidebar"></div>

<header id="top-header"></header>

<div id="main-content">
    <h5 class="fw-bold mb-4">Thông tin cá nhân</h5>

    <div class="row">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm p-4 text-center">
                <div class="position-relative d-inline-block mx-auto mb-3">
                    <img src="https://ui-avatars.com/api/?name=User+Name&size=150" 
                         class="rounded-circle img-thumbnail" width="150" alt="Avatar">
                    <button class="btn btn-sm btn-primary position-absolute bottom-0 end-0">
                        <i class="bi bi-camera"></i>
                    </button>
                </div>
                <h6 class="fw-bold mb-1">Nguyễn Văn Đoàn</h6>
                <p class="text-muted small">Đoàn viên - Chi đoàn A</p>
                <hr>
                <a href="#" class="btn btn-outline-danger btn-sm w-100">Đổi mật khẩu</a>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4">
                <form id="profileForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" value="Nguyễn Văn Đoàn">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" value="doanvien@gmail.com" disabled>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" class="form-control" value="0909xxxxxx">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Ngày sinh</label>
                            <input type="date" class="form-control" value="2000-01-01">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Số CCCD</label>
                        <input type="text" class="form-control" value="001xxxxxxxxx">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" class="form-control" value="Phủ Lý, Hà Nam">
                    </div>

                    <div class="mt-3 text-end">
                        <button type="submit" class="btn btn-primary px-4">Cập nhật thông tin</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
