<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/x-icon" href="/image/logo.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link href='https://fonts.googleapis.com/css?family=Quicksand' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
    <script src="http://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="http://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

      <script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
    <link rel="stylesheet" href="../css/styleadmin.css">
    <script src="js/main.js"></script>
    <script src="js/event.js"></script>
    <script>
        window.onload =async function() {
            loadOrganizations();
            loadStatus();
        }
    </script>
</head>
<body>

<div id="sidebar"></div>

<header id="top-header"></header>

<div id="main-content">
    <div class="card border-0 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold">Quản lý sự kiện</h5>
            <div class="d-flex gap-2">
                <a href="add-sukien.html" class="btn btn-primary" >
                    <i class="bi bi-plus-lg"></i> Thêm mới
                </a>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-2">
                <input type="text" id="search" class="form-control" placeholder="Tìm theo từ khóa">
            </div>
            <div class="col-md-3">
                 <input type="text" id="dateRange" class="form-control" placeholder="Chọn khoảng ngày...">
            </div>
            <div class="col-md-2">
                <select class="form-select" id="status">
                    <option selected value="">Tất cả trạng thái</option>
                    <option value="true">Đang hoạt động</option>
                    <option value="false">Đã khóa</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="organizations">
                </select>
            </div>
            <div class="col-md-2">
                <button onclick="loadUsers(0)" class="btn btn-outline-secondary w-100"><i class="bi bi-funnel"></i> Lọc</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th style="width: 80px;">Banner</th>
                        <th>Tên sự kiện</th>
                        <th>Đơn vị tổ chức</th>
                        <th>Thời gian diễn ra</th>
                        <th>Hạn đăng ký</th>
                        <th>Địa điểm</th>
                        <th class="text-center">Số lượng</th>
                        <th class="text-center">Phí</th>
                        <th class="text-center">Trạng thái</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                </thead>

                <tbody id="list-event">

                    <!-- Example row -->
                    <tr>

                        <!-- Banner -->
                        <td>
                            <img src="https://via.placeholder.com/60x40"
                                class="rounded"
                                style="width:60px;height:40px;object-fit:cover;">
                        </td>

                        <!-- Name -->
                        <td>
                            <div class="fw-semibold">Trại hè Huynh Trưởng 2026</div>
                            <small class="text-muted">ID: 12</small>
                        </td>

                        <!-- Organizer -->
                        <td>Liên đoàn ABC</td>

                        <!-- Event time -->
                        <td>
                            <div>05/03/2026</div>
                            <small class="text-muted">08:00 - 17:00</small>
                        </td>

                        <!-- Registration deadline -->
                        <td>
                            <span class="text-danger">
                                01/03/2026 23:59
                            </span>
                        </td>

                        <!-- Location -->
                        <td>
                            <small>Nhà thờ X, Hà Nội</small>
                        </td>

                        <!-- Participants -->
                        <td class="text-center">
                            120
                        </td>

                        <!-- Fee -->
                        <td class="text-center">
                            50,000đ
                        </td>

                        <!-- Status -->
                        <td class="text-center">
                            <span class="badge bg-success">
                                Đang mở đăng ký
                            </span>
                        </td>

                        <!-- Actions -->
                        <td class="text-end">

                            <button class="btn btn-sm btn-outline-primary">
                                Sửa
                            </button>

                            <button class="btn btn-sm btn-outline-danger">
                                Xóa
                            </button>

                        </td>

                    </tr>

                </tbody>
            </table>
        </div>

        <nav class="mt-3">
            <ul id="pagination" class="pagination justify-content-end">
            </ul>
        </nav>
    </div>
</div>

<script>
    $(function() {
        $('#dateRange').daterangepicker({
            autoUpdateInput: false,
            locale: {
                format: 'DD/MM/YYYY',
                applyLabel: "Áp dụng",
                cancelLabel: "Xóa",
                daysOfWeek: ["CN", "T2", "T3", "T4", "T5", "T6", "T7"],
                monthNames: ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"]
            }
        });

        // Cập nhật text vào input sau khi chọn
        $('#dateRange').on('apply.daterangepicker', function(ev, picker) {
            $(this).val(picker.startDate.format('DD/MM/YYYY') + ' - ' + picker.endDate.format('DD/MM/YYYY'));
        });

        $('#dateRange').on('cancel.daterangepicker', function(ev, picker) {
            $(this).val('');
        });
    });
</script>
</body>
</html>
