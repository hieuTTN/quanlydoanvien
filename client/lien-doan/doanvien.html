<script>
function loadNamSinh() {
    const select = document.getElementById("namsinh");
    const currentYear = new Date().getFullYear();
    const minYear = currentYear - 60; // lùi 60 năm

    let options = '<option value="">-- Chọn năm sinh --</option>';

    for (let year = currentYear; year >= minYear; year--) {
        options += `<option value="${year}">${year}</option>`;
    }

    select.innerHTML = options;
}

document.addEventListener("DOMContentLoaded", loadNamSinh);
</script>
