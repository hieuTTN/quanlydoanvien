<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đoàn Portal</title>
<link rel="icon" type="image/x-icon" href="/image/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
<script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
<link rel="stylesheet" type="text/css" href="/css/main.css">
<script src="js/main.js"></script>
<script src="js/user.js"></script>
<script src="/js/address.js"></script>
<script>
    window.onload = async function() {
        loadSideBar();
        await initData();
        await loadAddress();
        loadAUser();
    }
</script>
</head>
<body>

<nav class="navbar navbar-expand-lg member-navbar" id="menu-doanvien">

</nav>

<div class="container">

    <div class="row">
        <div class="col-md-12" id="infor-top">
        </div>
        <div class="col-lg-3" id="sidebarmain">
        </div>
        <div class="col-lg-9">
            <div id="main-content">
                <div class="card border-0 shadow-sm p-4">
                <h5 class="fw-bold mb-4">Thêm mới tài khoản Đoàn viên</h5>
                <div id="userForm">
                    <div class="row g-3">
                        <div class="col-md-2">
                            <div class="row">
                                <div class="col-6 col-md-12 col-lg-12">
                                    <button type="button" id="btnchoosefile" onclick="document.getElementById('fileanhdaidientl').click(); return false;" class="btnchonanh" style="background-image: url('/image/backluuanh.png');">
                                        <i class="fa fa-camera camera"></i><br><span class="tieudetaianhdd">Tải ảnh đại diện</span>
                                    </button>
                                </div>
                                <div class="col-6 col-md-12 col-lg-12">
                                    <img id="imgpreviewtl" class="imgpreviewtl">
                                </div>
                                <input onchange="chooseAvatar()" type="file" id="fileanhdaidientl" style="display: none;">
                            </div>
                            <div class="col-md-12">
                                <div class="form-check form-switch">
                                    <input type="checkbox" id="actived" class="form-check-input" checked role="switch">
                                    <label class="form-check-label" for="actived">
                                        Hoạt động
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-5">
                            <div class="col-md-12">
                                <div class="form-floating mt-3">
                                    <input type="email" class="form-control" id="email" placeholder="Email">
                                    <label>Email</label>
                                </div>
                            </div>
                        <div class="col-md-12">
                                <div class="form-floating mt-3">
                                    <input type="password" class="form-control" id="password" placeholder="Password">
                                    <label>Password (để trống nếu không đổi)</label>
                                </div>
                        </div>
                            <!-- FullName -->
                            <div class="col-md-12">
                                <div class="form-floating mt-3">
                                    <input class="form-control" id="fullName" placeholder="Họ tên">
                                    <label>Họ tên</label>
                                </div>
                            </div>
                            <!-- Phone -->
                            <div class="col-md-12">
                                <div class="form-floating mt-3">
                                    <input class="form-control" id="phone" placeholder="Phone">
                                    <label>Số điện thoại</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-5">
                            <!-- CCCD -->
                            <div class="col-md-12">
                                <div class="form-floating mt-3">
                                    <input class="form-control" id="idc" placeholder="CCCD">
                                    <label>CCCD</label>
                                </div>
                            </div>
                            <!-- DOB -->
                            <div class="col-md-12">
                                <div class="form-floating mt-3">
                                    <input type="date" class="form-control" id="dob">
                                    <label>Ngày sinh</label>
                                </div>
                            </div>
                            <!-- Gender -->
                            <div class="col-md-12">
                                <div class="form-floating mt-3">
                                    <select id="gender" class="form-select">
                                        <option value="">Chọn</option>
                                        <option value="Nam">Nam</option>
                                        <option value="Nữ">Nữ</option>
                                    </select>
                                    <label>Giới tính</label>
                                </div>
                            </div>
                            <!-- Address -->
                            <div class="col-md-12">
                                <div class="row">
                                    <div class="col-md-6  mt-3">
                                        <select onchange="loadHuyenOnchange()" id="tinh" class="form-control select2">

                                        </select>
                                    </div>
                                    <div class="col-md-6 mt-3">
                                        <select id="xa" class="form-control">
                                            <option value="" hidden="">---</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-floating mt-3">
                                    <input class="form-control" id="stressName" placeholder="Address">
                                    <label>Chi tiết địa chỉ (tên đường, số nhà)</label>
                                </div>
                            </div>
                            <input class="form-control" id="avatar" type="hidden">
                        </div>

                    </div>
                    <div class="d-flex justify-content-between mt-2">

                        <h5>Danh sách quyền</h5>

                        <button type="button"
                                class="btn btn-success btn-sm"
                                onclick="addAuthorityRow()">

                            Thêm quyền

                        </button>

                    </div>


                    <table class="table table-bordered mt-2 mb-2">

                        <thead>

                        <tr>

                            <th style="width:25%">Role</th>

                            <th style="width:25%">OrganizationType</th>

                            <th style="width:30%">Organization</th>

                            <th>Head</th>

                            <th>Default</th>

                            <th></th>

                        </tr>

                        </thead>

                        <tbody id="authorityTable">

                        </tbody>

                    </table>
                    <button onclick="saveUser()" id="btn-submit" class="btn btn-primary">

                        Lưu User

                    </button>
                </div>
            </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
