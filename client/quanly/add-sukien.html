<script>
    $(function() {
        $('#dateRange').daterangepicker({
            autoUpdateInput: false,
            timePicker: true,
            timePicker24Hour: true,
            timePickerSeconds: false,
            timePickerIncrement: 5, // nhảy 5 phút 1 lần

            locale: {
                format: 'DD/MM/YYYY HH:mm',
                applyLabel: "Áp dụng",
                cancelLabel: "Xóa",
                daysOfWeek: ["CN", "T2", "T3", "T4", "T5", "T6", "T7"],
                monthNames: [
                    "Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4",
                    "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8",
                    "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"
                ]
            }
        });

        $('#dateRange').on('apply.daterangepicker', function(ev, picker) {
            $(this).val(
                picker.startDate.format('DD/MM/YYYY HH:mm') +
                ' - ' +
                picker.endDate.format('DD/MM/YYYY HH:mm')
            );
        });

        $('#dateRange').on('cancel.daterangepicker', function() {
            $(this).val('');
        });
    });
</script>

            'searchreplace wordcount visualblocks visualchars code fullscreen insertdatetime media nonbreaking ' +

    // Định nghĩa các nút trên thanh công cụ. Chia thành nhiều dòng để dễ quản lý.
    toolbar: 'undo redo | blocks | ' + // Hoàn tác, làm lại, và định dạng khối (Heading 1, 2, Paragraph,...)
            'bold italic underline strikethrough | forecolor backcolor | ' + // Định dạng chữ: đậm, nghiêng, gạch chân, gạch ngang, màu chữ, màu nền
            'alignleft aligncenter alignright alignjustify | outdent indent | ' + // Căn lề, lùi dòng
            'numlist bullist | link image media table | ' + // Danh sách số, danh sách dấu chấm, chèn liên kết, ảnh, video, bảng
            'charmap emoticons | fullscreen code preview | help', // Ký tự đặc biệt, biểu tượng cảm xúc, chế độ toàn màn hình, xem trước, mã nguồn, trợ giúp
    height: 600, // Tăng chiều cao của trình soạn thảo
    menubar: 'file edit view insert format tools table help', // Hiện thêm menu bar ở trên cùng
    setup: function (editor) {
        editor.on('init', function () {
            if (!editor.getContent().trim()) {
                editor.setContent(getEventTemplate());
            }
        });
    },
    images_upload_handler: async function (blobInfo, success, failure) {
      const formData = new FormData();
      formData.append('file', blobInfo.blob(), blobInfo.filename());

      const res = await fetch('http://localhost:8080/api/public/upload-file', {
        method: 'POST',
        body: formData
      });
      if (res.status < 300) {
        var linkImage = await res.text();
        success(linkImage);
      }
    }
  });
</script>


<script>
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const uploadContent = document.getElementById('uploadContent');

    uploadBox.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change',async function () {
        if (this.files.length > 0) {
                // Tải file lên server
            document.getElementById("btn-submit").disabled = true
            document.getElementById("btn-submit").innerText = "Đang tải file hướng dẫn..."
            const filePath = document.getElementById('fileInput')
            const formData = new FormData()
            formData.append("file", filePath.files[0])
            var urlUpload = 'http://localhost:8080/api/public/upload-file';
            const res = await fetch(urlUpload, {
                method: 'POST',
                body: formData
            });
            if (res.status < 300) {
                const linkFile = await res.text();
                document.getElementById("attachmentUrl").value = linkFile;
                const file = this.files[0];
                const fileSize = (file.size / 1024).toFixed(2) + " KB";
                uploadContent.innerHTML = `
                    <div class="file-info">
                        <div style="font-size:35px;">📄</div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${fileSize}</div>
                    </div>
                `;
                uploadBox.classList.add("active");
                toastr.success("Tải file thành công!");
            }
            else{
                toastr.error("Tải file thất bại. Vui lòng thử lại.");
            }
            document.getElementById("btn-submit").disabled = false
            document.getElementById("btn-submit").innerText = "Lưu sự kiện"   
        }
    });

    // Drag & Drop
    uploadBox.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadBox.style.borderColor = "#0d6efd";
    });

    uploadBox.addEventListener("dragleave", () => {
        uploadBox.style.borderColor = "#ced4da";
    });

    uploadBox.addEventListener("drop", (e) => {
        e.preventDefault();
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
    });

    async function chooseAvatar(){
        document.getElementById("btn-submit").disabled = true
        document.getElementById("btn-submit").innerText = "Đang tải ảnh..."
        const filePath = document.getElementById('fileanhdaidientl')
        const formData = new FormData()
        formData.append("file", filePath.files[0])
        var urlUpload = 'http://localhost:8080/api/public/upload-file';
        const res = await fetch(urlUpload, {
            method: 'POST',
            body: formData
        });
        if (res.status < 300) {
            const linkImage = await res.text();
            document.getElementById("avatar").value = linkImage;
            document.getElementById("btnchoosefile").style.backgroundImage = `url('${linkImage}')`;
        }
        document.getElementById("btn-submit").disabled = false
        document.getElementById("btn-submit").innerText = "Lưu sự kiện"
    }
</script>
