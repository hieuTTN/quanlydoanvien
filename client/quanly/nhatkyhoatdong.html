<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đoàn Viên Portal</title>
<link rel="icon" type="image/x-icon" href="/image/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
<script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>

<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
<link rel="stylesheet" type="text/css" href="/css/main.css">
<script src="js/main.js"></script>
<script src="js/log.js"></script>
<script>
    window.onload = function() {
        loadSideBar();
        loadLogs(0); 
    }
</script>
</head>
<body>

<nav class="navbar navbar-expand-lg member-navbar" id="menu-doanvien">

</nav>

<div class="container">

    <div class="row">
        <div class="col-md-12" id="infor-top">
        </div>
        <div class="col-lg-3" id="sidebarmain">
        </div>
        <div class="col-lg-9">
            <div class="account-content">
                <div class="account-page-header">
                    <div class="account-page-title">Nhật ký hoạt động</div>
                    <div class="account-page-desc">Các hoạt động gần đây của bạn</div>
                </div>
                <div class="card border-0 shadow-sm p-4 mb-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="text" id="dateRange" class="form-control" placeholder="Chọn khoảng ngày...">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100" onclick="loadLogs(0)">
                                <i class="bi bi-filter"></i> Lọc
                            </button>
                        </div>
                    </div>
                </div>


                <div class="account-card">

                    <ul class="list-group list-group-flush" id="list-log">

                    </ul>
                    <nav class="mt-4">
                        <ul class="pagination justify-content-center" id="pagination">
                        </ul>
                    </nav>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script>
    $(function() {
        $('#dateRange').daterangepicker({
            autoUpdateInput: false,
            locale: {
                format: 'DD/MM/YYYY',
                applyLabel: "Áp dụng",
                cancelLabel: "Xóa",
                daysOfWeek: ["CN", "T2", "T3", "T4", "T5", "T6", "T7"],
                monthNames: ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"]
            }
        });

        // Cập nhật text vào input sau khi chọn
        $('#dateRange').on('apply.daterangepicker', function(ev, picker) {
            $(this).val(picker.startDate.format('DD/MM/YYYY') + ' - ' + picker.endDate.format('DD/MM/YYYY'));
        });

        $('#dateRange').on('cancel.daterangepicker', function(ev, picker) {
            $(this).val('');
        });
    });
</script>
</html>
