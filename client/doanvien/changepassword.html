<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đoàn Viên Portal</title>
<link rel="icon" type="image/x-icon" href="/image/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
<script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<link rel="stylesheet" type="text/css" href="/css/main.css">
<script src="js/main.js"></script>
<script src="js/user.js"></script>
<script>
    window.onload = function() {
        loadSideBar();
    }
</script>
</head>
<body>

<nav class="navbar navbar-expand-lg member-navbar" id="menu-doanvien">

</nav>

<div class="container account-layout">

    <div class="row">
        <div class="col-lg-3" id="sidebarmain">
        </div>
        <div class="col-lg-9">
            <div class="account-content">
                <div class="account-page-header">
                    <div class="account-page-title">Đổi mật khẩu</div>
                    <div class="account-page-desc">Đảm bảo mật khẩu đủ mạnh để bảo vệ tài khoản</div>
                </div>

                <div class="account-card">

                    <div class="col-md-6">

                        <div class="mb-3">
                            <label>Mật khẩu hiện tại</label>
                            <input id="oldpass" type="password" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Mật khẩu mới</label>
                            <input id="newpass" type="password" class="form-control">
                            <small class="text-muted">
                                Mật khẩu nên có ít nhất 8 ký tự
                            </small>
                        </div>

                        <div class="mb-3">
                            <label>Nhập lại mật khẩu mới</label>
                            <input id="renewpass" type="password" class="form-control">
                        </div>

                        <button class="btn btn-primary account-btn" onclick="changePassword()">
                            Cập nhật mật khẩu
                        </button>

                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
