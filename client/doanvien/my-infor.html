<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đoàn Viên Portal</title>
<link rel="icon" type="image/x-icon" href="/image/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
<script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<link rel="stylesheet" type="text/css" href="/css/main.css">
<script src="js/main.js"></script>
<script src="js/user.js"></script>
<script src="js/address.js"></script>
<script>
    window.onload = async function() {
        loadSideBar();
        await loadAddress();
        loadInitInfor();
    }
</script>
</head>
<body>

<nav class="navbar navbar-expand-lg member-navbar" id="menu-doanvien">

</nav>

<div class="container">

    <div class="row">
        <div class="col-md-12" id="infor-top">
        </div>
        <!-- Sidebar -->
        <div class="col-lg-3" id="sidebarmain">
        </div>

        <!-- Content -->
        <div class="col-lg-9">
            <div class="account-content">
                <div class="account-page-header">
                    <div class="account-page-title">Thông tin tài khoản</div>
                    <div class="account-page-desc">Cập nhật thông tin cá nhân của bạn</div>
                </div>

                <div class="account-card">

                    <div class="row">

                        <!-- Avatar -->
                        <div class="col-md-3 text-center">
                            <img src="/image/default-avatar.jpg" id="avatar"
                                class="rounded-circle img-circle mb-3"
                                width="120">
                            <div>
                                <button class="btn btn-outline-secondary btn-sm" id="changeAvatarBtn" onclick="document.getElementById('avatarInput').click(); return false;">
                                    Đổi ảnh
                                </button>
                                <input onchange="chooseAvatar()" type="file" id="avatarInput" style="display: none;" accept="image/*">
                            </div>
                        </div>

                        <!-- Form -->
                        <div class="col-md-9">
                            <input type="hidden" id="avatarUrl">
                                <div class="row">
                                <div class="col-md-6 mb-3">
                                     <div class="form-floating form-add-user">
                                        <input class="form-control" id="fullname" placeholder="ho ten">
                                        <label>Họ và tên</label>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <div class="form-floating form-add-user">
                                        <input class="form-control" id="phone" placeholder="so dien thoai">
                                        <label>Số điện thoại</label>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <div class="form-floating form-add-user">
                                        <input class="form-control" id="job" placeholder="so dien thoai">
                                        <label>Công việc</label>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <div class="form-floating form-add-user">
                                        <input class="form-control" id="religion" placeholder="so dien thoai">
                                        <label>Tôn giáo</label>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <div class="form-floating form-add-user">
                                        <input class="form-control" id="birthday" type="date" placeholder="ngay sinh">
                                        <label>Ngày sinh</label>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <div class="form-floating form-add-user">
                                        <select class="form-select" id="gender">
                                            <option value="Nam">Nam</option>
                                            <option value="Nữ">Nữ</option>
                                        </select>
                                        <label>Giới tính</label>
                                    </div>
                                </div>

                                <div class="col-md-6  form-add-user mb-3">
                                    <select onchange="loadHuyenOnchange()" id="tinh" class="form-control select2">

                                    </select>
                                </div>
                                <div class="col-md-6 form-add-user mb-3">
                                    <select id="xa" class="form-control">
                                        <option value="" hidden="">---</option>
                                    </select>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <div class="form-floating form-add-user">
                                        <input class="form-control" id="address" placeholder="dia chi">
                                        <label>Tên đường, số nhà</label>
                                    </div>
                                </div>

                            </div>

                            <div class="text-end mt-3">
                                <button onclick="updateInfor()" class="btn btn-primary account-btn" id="btn-submit">
                                    Lưu thay đổi
                                </button>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
<script>
    async function chooseAvatar(){
        document.getElementById("btn-submit").disabled = true
        document.getElementById("btn-submit").innerText = "Đang tải ảnh..."
        const filePath = document.getElementById('avatarInput')
        const formData = new FormData()
        formData.append("file", filePath.files[0])
        var urlUpload = 'http://localhost:8080/api/public/upload-file';
        const res = await fetch(urlUpload, {
            method: 'POST',
            body: formData
        });
        if (res.status < 300) {
            const linkImage = await res.text();
            document.getElementById("avatarUrl").value = linkImage;
            document.getElementById("avatar").src = linkImage;
            toastr.success("Tải ảnh thành công")
        }
        document.getElementById("btn-submit").disabled = false
        document.getElementById("btn-submit").innerText = "Lưu thay đổi"
    }
</script>
</html>
