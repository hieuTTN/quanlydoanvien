<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đoàn Viên Portal</title>
<link rel="icon" type="image/x-icon" href="/image/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/1.1.3/sweetalert.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.0.2/js/toastr.min.js"></script>
<script src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<link rel="stylesheet" type="text/css" href="/css/main.css">
<script src="js/main.js"></script>
<script src="js/regis-event.js"></script>
<script>
    window.onload = function() {
        loadSideBar();
        loadEventRegis(0);
    }
</script>
</head>
<body>

<nav class="navbar navbar-expand-lg member-navbar" id="menu-doanvien">

</nav>

<div class="container account-layout">

    <div class="row">
        <div class="col-lg-3" id="sidebarmain">
        </div>
        <div class="col-lg-9">
            <div class="account-content">
                <div class="account-page-header">
                    <div class="account-page-title">Sự kiện đã đăng ký</div>
                    <div class="account-page-desc">Danh sách các sự kiện bạn đã tham gia</div>
                </div>

                <div class="account-card">

                    <div class="d-flex justify-content-between mb-3">
                        <input type="text" id="search" class="form-control w-50"
                            placeholder="Tìm kiếm sự kiện..." onkeyup="loadEventRegis(0)">

                        <select class="form-select w-auto" id="statusFilter" onchange="loadEventRegis(0)">
                            <option value="">Tất cả</option>
                            <option value="APPROVED">Đã duyệt</option>
                            <option value="PENDING">Chờ duyệt</option>
                            <option value="REJECTED">Từ chối</option>
                            <option value="CANCEL">Đã hủy</option>
                        </select>
                    </div>

                    <div class="table-responsive">
                        <table class="table account-table align-middle">
                            <thead>
                                <tr>
                                    <th>Tên sự kiện</th>
                                    <th>Ngày hết hạn đăng ký</th>
                                    <th>Trạng thái</th>
                                    <th>Tổ chức chính</th>
                                    <th>Hủy đăng ký</th>
                                </tr>
                            </thead>
                            <tbody id="list-event-regis">
                            </tbody>
                        </table>
                        <nav class="mt-4">
                            <ul class="pagination justify-content-center" id="pagination">
                            </ul>
                        </nav>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
